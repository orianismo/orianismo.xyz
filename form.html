<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cadastro</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
form {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  display: inline-block;
}
input {
  margin: 10px;
  padding: 10px;
  width: 200px;
  border-radius: 6px;
  border: none;
}
button {
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  color: white;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>Cadastro de fiéis</h2>

<form action="https://formsubmit.co/SEUEMAIL" method="POST">
  <input type="text" name="nome" placeholder="Nome" required><br>
  <input type="email" name="email" placeholder="Email" required><br>
  <button type="submit">Cadastrar</button>
</form>

</body>
</html>
